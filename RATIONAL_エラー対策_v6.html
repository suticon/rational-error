<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RATIONALエラー検索">
<title>RATIONALエラー検索</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
  background:#24262e;
  color:#f0f0f2;
  min-height:100vh;
}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  /* 上部白グローライン */
  border-top:3px solid transparent;
  border-image:linear-gradient(90deg,transparent,#a0a2a6 15%,#fff 40%,#fff 60%,#a0a2a6 85%,transparent) 1;
  box-shadow:0 0 10px rgba(255,255,255,.15);
}
/* ヘッダー全体をメタリックで統一 */
.hdr{
  background:
    repeating-linear-gradient(0deg,rgba(255,255,255,.022) 0,rgba(255,255,255,.022) 1px,transparent 1px,transparent 3px),
    linear-gradient(170deg,#484a52 0%,#30323a 35%,#3a3c44 60%,#2a2c34 80%,#24262e 100%);
  padding:calc(env(safe-area-inset-top)+16px) 20px 18px;
  position:relative;
}
.hdr::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.22) 30%,rgba(255,255,255,.28) 50%,rgba(255,255,255,.22) 70%,transparent);
}

/* タイトル行 */
.toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.title{font-size:22px;font-weight:600;color:#f0f0f2;letter-spacing:-0.3px;line-height:1.1}
.logo-img{
  height:24px;width:auto;object-fit:contain;flex-shrink:0;
  border-radius:4px;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}

/* セパレーター */
.sep{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12) 30%,rgba(255,255,255,.12) 70%,transparent);
  margin-bottom:14px;
}

/* ── TABS ── */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tab{
  border-radius:13px;padding:12px 8px 11px;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,rgba(255,255,255,.02) 100%);
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 4px 14px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.3);
  position:relative;overflow:hidden;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all .2s ease;
}
.tab.active{
  background:linear-gradient(180deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.05) 100%);
  border:1px solid rgba(255,255,255,.38);
  box-shadow:0 4px 18px rgba(255,255,255,.08),inset 0 1px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(0,0,0,.25);
}
.tab.active::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#d0d2d6 20%,#fff 50%,#d0d2d6 80%,transparent);
  box-shadow:0 1px 6px rgba(255,255,255,.35);
}
.tab img{
  width:100%;height:76px;object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.6));
  opacity:.35;transition:opacity .2s;
}
.tab.active img{opacity:1}
.tab-name{font-size:15px;font-weight:600;color:rgba(255,255,255,.32);letter-spacing:.3px;transition:color .2s}
.tab.active .tab-name{color:#f0f0f2}
.tab-bar{width:26px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;transition:background .2s}
.tab.active .tab-bar{background:#fff;box-shadow:0 0 6px rgba(255,255,255,.4)}

/* ── 検索ボックス ── */
.sbox{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.28);
  border:1px solid rgba(255,255,255,.14);
  border-radius:11px;padding:0 14px;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.06);
  margin-bottom:0;
}
.sbox input{
  flex:1;background:none;border:none;outline:none;
  color:#d0d2d8;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:400;
  padding:13px 0;-webkit-appearance:none;
}
.sbox input::placeholder{color:rgba(255,255,255,.22)}
.sbox .clr{
  background:rgba(255,255,255,.1);border:none;
  color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;
  width:24px;height:24px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
  flex-shrink:0;line-height:1;
}

/* ヒント */
.hint{
  font-size:13px;font-weight:500;
  color:rgba(255,255,255,.45);
  text-align:center;padding-top:10px;letter-spacing:.2px;
}

/* ── DECODE ── */
.decode{
  background:rgba(0,0,0,.3);
  border-top:1px solid rgba(255,255,255,.08);
  padding:8px 18px 10px;display:none;
}
.dpill{
  display:inline-block;
  background:rgba(255,255,255,.08);
  border:0.5px solid rgba(255,255,255,.15);
  border-radius:20px;padding:4px 10px;
  font-size:12px;color:rgba(255,255,255,.7);
  margin:3px 3px 0 0;
}
.dpill b{color:#fff;font-weight:600}

/* ── RESULTS ── */
.rarea{padding:14px 0 calc(40px + env(safe-area-inset-bottom))}
.nores{text-align:center;padding:52px 24px;color:rgba(255,255,255,.4)}
.nores .ni{font-size:44px;margin-bottom:14px}
.nores h3{font-size:17px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:8px}
.nores p{font-size:14px;line-height:1.7;color:rgba(255,255,255,.35)}

/* ── カード ── */
.rcard{
  margin:0 14px 16px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  overflow:hidden;
}
.rc-head{
  background:linear-gradient(170deg,#3a3c44 0%,#28292e 100%);
  padding:16px 18px;
  border-bottom:1px solid rgba(255,255,255,.08);
  position:relative;
}
.rc-head::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2) 30%,rgba(255,255,255,.2) 70%,transparent);
}
.rc-code{
  font-family:"SF Mono",Menlo,Consolas,monospace;
  font-size:22px;font-weight:700;
  color:#fff;margin-bottom:5px;letter-spacing:.3px;
}
.rc-code-red{color:#ff6b6b}
.rc-title{font-size:16px;font-weight:500;color:rgba(255,255,255,.85);line-height:1.4;margin-bottom:8px}
.dprow{display:flex;flex-wrap:wrap;gap:5px}
.dp2{background:rgba(255,255,255,.1);border-radius:20px;padding:4px 10px;font-size:12px;color:rgba(255,255,255,.65)}
.dp2 span{color:rgba(255,255,255,.35);font-size:11px}

.rc-desc{
  background:#1e1f26;
  padding:12px 16px;font-size:14px;line-height:1.75;
  color:rgba(255,255,255,.7);
  border-left:3px solid rgba(255,255,255,.3);
}
.ddlbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);margin-bottom:4px}

/* 原因・対策セクション */
.cf-section-label{
  font-size:15px;font-weight:600;color:rgba(255,255,255,.8);
  padding:13px 16px 9px;
  background:#1a1b22;
  border-top:1px solid rgba(255,255,255,.06);
}
.comp-block{
  background:#1e1f26;
  border-top:1px solid rgba(255,255,255,.06);
}
.comp-head{
  background:#252630;color:rgba(255,255,255,.65);font-size:13px;font-weight:600;
  padding:9px 16px;display:flex;align-items:center;gap:7px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.cf-pair{
  padding:13px 16px;
  border-top:1px solid rgba(255,255,255,.05);
}
.cf-pair:first-child{border-top:none}
.cf-row{display:flex;gap:10px;align-items:flex-start}
.cf-row+.cf-row{margin-top:8px}
.cf-badge{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding:3px 8px;border-radius:5px;flex-shrink:0;margin-top:2px;
  min-width:36px;text-align:center;
}
.badge-cause{background:rgba(220,60,60,.25);color:#ff8888;border:0.5px solid rgba(220,60,60,.4)}
.badge-fix{background:rgba(180,180,220,.15);color:rgba(200,200,240,.8);border:0.5px solid rgba(180,180,220,.25)}
.cf-text{font-size:14px;line-height:1.75;color:rgba(255,255,255,.82)}
.cf-text.fix-text{color:rgba(255,255,255,.6)}
.no-cf{
  padding:18px 16px;font-size:14px;
  color:rgba(255,255,255,.35);text-align:center;
  background:#1e1f26;
}
.rcard-bottom{border-radius:0 0 15px 15px;overflow:hidden}
.rend{height:20px}
</style>
</head>

var IVARIO_DATA = [{"code":"S_X","title":"加熱制御の故障","full_title":"S_X_ 加熱制御の故障 - iVario","desc":"1つまたは複数の加熱素子が加熱しなくなりました。","causes_fixes":[{"component":"加熱素子 R.101～R.118","cause":"加熱素子に不具合があり、電力が供給されているにもかかわらず 加熱されません。","fix":"故障した加熱素子を交換してください。詳細については、 MI_2114を参照してください。 多くの場合、加熱素子の故障の原因は単なる故障ではありませ ん。 そのため、パン下部の湿気、接触不良など、原因または複数の原 因で考えられる組み合わせを特定して対処することが重要です。 その他の考えられる原因については、以下を参照してください。"},{"component":"加熱素子 R.101～R.118","cause":"誤った洗浄プロセスによる湿気の侵入 - 例えば、水噴射による ユニットの洗浄。","fix":"ユーザーに通知し、ユニットメニューで利用可能なドキュメント - ケアおよび洗浄アシスタントを参照します。 これにより、ユーザーはケアと洗浄プロセスを調整できます。"},{"component":"加熱素子 R.101～R.118","cause":"パンのカバーの遊びが大きすぎる、またはパッキンの欠如による 水分の侵入 - 多くの場合、再組み立ての不具合が原因です。 これにより、水や蒸気がユニットに侵入しやすくなります。","fix":"パンカバーにパッキンが完全に取り付けられているか点検しま す。 その後、パンのパネルを全てのパッキンと共に正しく再度取り付 けます。"},{"component":"加熱素子 R.101～R.118","cause":"蒸気の侵入による湿気の侵入。","fix":"ユニットのリアパネルが規定通りに壁から最低 30 mm 離して 設置されていることを点検します。 必要に応じて、後部スペーサーを取り付けます - MI_2514 / MI_2515 を参照してください。"},{"component":"加熱素子 R.101～R.118","cause":"湿気の侵入は、冷たい製品や冷凍した製品の解凍によって発生す ることがあります。 加熱素子をオンにせずに氷を加えることで食品を冷却する場合も 同様です（夜間など）。 これにより、加熱素子に結露が発生する可能性があります。","fix":"ユーザーに通知し、ユニットの取扱説明書を参照します。"},{"component":"加熱素子 R.101～R.118","cause":"LおよびXLのみ： パンバルブと排水管間の漏れによる水分の侵入。 これにより、パン下部に湿気が入り込む可能性があります。","fix":"排水管をパンバルブに再び差し込みます。 パンバルブにストッパーがある場合は、パイプをストッパーまで 差し込みます。 次に、排水管がシャーシのクランプでしっかりと固定されている ことを点検します。"},{"component":"加熱素子制御ステムW.7～W.8","cause":"加熱素子のフラットソケットの接触不良 - 過熱につながり、最 終的にフラットソケットの破損につながる可能性があります。","fix":"加熱素子と損傷したフラットソケットを交換します。 必要に応じて、ワイヤーハーネス全体を交換します。"},{"component":"半導体リレー(SSR)V.1～V.5","cause":"SSRが故障しており、機能していません。 I/OボードA10からの制御信号が受信されますが、加熱素子にSSR から電力が供給されません。 チェック – 電気配線図に基づいて以下の点検を実行します： n I/OボードA10の制御信号を点検します： – X125からX129までを測定します 例、X126からX129： ピン 1～4 （+）および 5 （-）で測定します 例、X125： ピン 1 （+）と2 （-）または3 （+）と4 （-）で測定し ます 目標値：12 V DC、出力作動時（加熱素子がオンになっ ている） n SSR出力の電圧を点検します： – 入力相と出力相の間を測定します。例、A1/B1とA2 実測値：0 V AC - 加熱素子に電力が供給される 実測値：≥ 200 V AC（またはそれ以上 - 接続電圧に依 存）- 加熱素子に電力が供給されない","fix":"故障した半導体リレー (SSR) を交換します - MI_2154（2-XS / 2-S 用）を参照してください。"},{   '41':'パン昇降','42':'蓋','43':'排出弁','44':'ロック','45':'高さ調節',
  '50':'圧力(全体)','51':'I/O圧力センサ','52':'パン圧力センサ',
  '53':'計算調理圧力','54':'パン温度センサ','55':'芯温センサ',
  '61':'給水','62':'制御ボックス','63':'温水','64':'圧力弁',
  '91':'CPU A11','92':'I/O A10','93':'安全チェーン','94':'SDカード',
  '95':'エネルギー最適化','96':'I/O A13','97':'リレー基板'
};
var ETYPE = {
  '01':'開回路','02':'低すぎる','03':'高すぎる','04':'オフセット異常',
  '05':'機能していない','06':'自動テスト失敗','07':'不安定',
  '10':'位置未定義','11':'位置相反','12':'転送不許可','14':'遅すぎる',
  '16':'漏れ','17':'エネルギー信号なし','20':'電源供給なし',
  '30':'割り当てなし','31':'ステータス不許可','32':'未校正',
  '50':'型式設定ミス','51':'オプション設定ミス'
};
var currentTab = 'icombi';
var DATA = ICOMBI_DATA;

function switchTab(tab) {
  currentTab = tab;
  DATA = tab==='icombi' ? ICOMBI_DATA : IVARIO_DATA;
  document.getElementById('tab-icombi').className='tab'+(tab==='icombi'?' active':'');
  document.getElementById('tab-ivario').className='tab'+(tab==='ivario'?' active':'');
  document.getElementById('si').placeholder = tab==='icombi'
    ? 'S_10 / S_42 / スチーム / ポンプ…'
    : '412 / S_0_930 / 安全チェーン / 漏れ…';
  document.getElementById('dec').style.display='none';
  document.getElementById('si').value='';
  document.getElementById('clr').style.display='none';
  document.getElementById('ra').innerHTML='';
}

function toHalf(s){
  var r='';
  for(var k=0;k<s.length;k++){
    var c=s.charCodeAt(k);
    if(c>=0xFF01&&c<=0xFF5E) r+=String.fromCharCode(c-0xFEE0);
    else if(c===0x30FC||c===0xFF70||c===0x2212||c===0x2015||c===0x2014||c===0x2013||c===0xFF0D) r+='-';
    else r+=s[k];
  }
  return r;
}

function bigramScore(q,text){
  if(q.length<2) return text.indexOf(q)!==-1?1:0;
  var m=0,t=q.length-1;
  for(var k=0;k<t;k++) if(text.indexOf(q.slice(k,k+2))!==-1) m++;
  return m/t;
}

function search(q){
  var results=[],ql=q.toLowerCase(),nums=q.replace(/[^0-9]/g,'');
  for(var i=0;i<DATA.length;i++){
    var e=DATA[i],score=0,codeL=(e.code||'').toLowerCase();
    if(codeL===ql) score=100;
    else if(codeL.indexOf(ql)!==-1) score=Math.max(score,85);
    else if(ql.indexOf(codeL)!==-1) score=Math.max(score,75);
    if(currentTab==='ivario'&&nums.length>=2){
      var m=(e.code||'').match(/^S_[012X]_([0-9X]{3})_([0-9X]{2})$/);
      if(m){
        var co=m[1],er=m[2],cQ=nums.slice(0,3),eQ=nums.slice(3,5),ok=true;
        for(var j=0;j<cQ.length;j++) if(co[j]!=='X'&&co[j]!==cQ[j]){ok=false;break;}
        if(ok){
          if(!eQ.length) score=Math.max(score,80);
          else{
            var eo=true;
            for(var j=0;j<eQ.length;j++) if(er[j]!=='X'&&er[j]!==eQ[j]){eo=false;break;}
            if(eo) score=Math.max(score,100);
          }
        }
      }
      if((e.code||'').replace(/[^0-9]/g,'').indexOf(nums)!==-1) score=Math.max(score,70);
    }
    if(currentTab==='icombi'&&nums.length>=2)
      if((e.code||'').replace(/[^0-9]/g,'').indexOf(nums)!==-1) score=Math.max(score,70);
    if(e.search.indexOf(ql)!==-1) score=Math.max(score,55);
    if((e.title||'').toLowerCase().indexOf(ql)!==-1) score=Math.max(score,65);
    if(ql.length>=2&&score<55&&!nums.length){
      var bs=bigramScore(ql,e.search);
      if(bs>=0.35) score=Math.max(score,Math.round(25+bs*30));
    }
    if(score>0) results.push({e:e,s:score});
  }
  results.sort(function(a,b){return b.s-a.s;});
  var top=results[0]?results[0].s:0,thr=top>=70?70:top>=50?50:top,show=[];
  for(var k=0;k<results.length;k++){if(results[k].s>=thr)show.push(results[k]);if(show.length>=5)break;}
  return show;
}

function renderCard(e){
  var isIC=currentTab==='icombi';
  var pills='';
  if(!isIC){
    var m=(e.code||'').match(/^S_([012X])_([0-9X]{3})_([0-9X]{2})$/);
    if(m){
      var pan={'0':'全パン共通','1':'左パン','2':'右パン','X':'全パン共通'}[m[1]]||m[1];
      pills='<div class="dprow">'+
        '<div class="dp2"><span>パン </span>'+esc(pan)+'</div>'+
        '<div class="dp2"><span>部品 </span>'+esc(COMP[m[2].slice(0,2)]||m[2])+'</div>'+
        '<div class="dp2"><span>種別 </span>'+esc(ETYPE[m[3]]||m[3])+'</div>'+
        '</div>';
    }
  }

  var byComp={},compOrder=[];
  (e.causes_fixes||[]).forEach(function(cf){
    var k=cf.component||'一般';
    if(!byComp[k]){byComp[k]=[];compOrder.push(k);}
    byComp[k].push(cf);
  });

  var cfHtml='<div class="cf-section-label">考えられる原因と対策</div>';
  if(!compOrder.length){
    cfHtml+='<div class="no-cf">詳細はマニュアルを参照してください</div>';
  }else{
    compOrder.forEach(function(kk){
      cfHtml+='<div class="comp-block">';
      cfHtml+='<div class="comp-head">&#x1F527; '+esc(kk)+'</div>';
      byComp[kk].forEach(function(cf){
        cfHtml+='<div class="cf-pair">';
        cfHtml+='<div class="cf-row"><span class="cf-badge badge-cause">原因</span><span class="cf-text">'+esc(cf.cause)+'</span></div>';
        if(cf.fix) cfHtml+='<div class="cf-row"><span class="cf-badge badge-fix">対策</span><span class="cf-text fix-text">'+esc(cf.fix)+'</span></div>';
        cfHtml+='</div>';
      });
      cfHtml+='</div>';
    });
  }

  return '<div class="rcard">'+
    '<div class="rc-head">'+
    '<div class="rc-code"><span class="rc-code-red">'+esc(e.code||'')+'</span></div>'+
    '<div class="rc-title">'+esc(e.full_title||e.title)+'</div>'+
    pills+'</div>'+
    (e.desc?'<div class="rc-desc"><div class="ddlbl">エラーの説明</div>'+esc(e.desc)+'</div>':'')+
    '<div class="rcard-bottom">'+cfHtml+'</div>'+
    '</div>';
}

function doSearch(){
  var q=toHalf(document.getElementById('si').value);
  document.getElementById('clr').style.display=q?'flex':'none';
  if(!q.trim()){
    document.getElementById('ra').innerHTML='';
    document.getElementById('dec').style.display='none';
    return;
  }
  var dec=document.getElementById('dec');
  if(currentTab==='ivario'&&q.replace(/[^0-9]/g,'').length>=2&&q.trim().replace(/[^0-9]/g,'').length===q.trim().length){
    var nums=q.replace(/[^0-9]/g,'');
    dec.style.display='block';
    dec.innerHTML=
      '<span class="dpill">S_*_<b>'+esc(nums.slice(0,3)||'???')+'</b>_<b>'+esc(nums.length>=4?nums.slice(3,5):'??')+'</b></span>'+
      '<span class="dpill">コンポーネント: <b>'+esc(COMP[nums.slice(0,2)]||'—')+'</b></span>'+
      (nums.length>=4?'<span class="dpill">種別: <b>'+esc(ETYPE[nums.slice(3,5)]||nums.slice(3,5))+'</b></span>':'');
  }else dec.style.display='none';

  var results=search(q),ra=document.getElementById('ra');
  if(!results.length){
    ra.innerHTML='<div class="nores"><div class="ni">&#x1F50D;</div><h3>見つかりません</h3><p>別のキーワードや数字でお試しください。</p></div>';
    return;
  }
  ra.innerHTML=results.map(function(r){return renderCard(r.e);}).join('');
  window.scrollTo(0,0);
}

function clr(){
  document.getElementById('si').value='';
  document.getElementById('clr').style.display='none';
  document.getElementById('dec').style.display='none';
  document.getElementById('ra').innerHTML='';
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('si').addEventListener('input',doSearch);
</script>
